<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script type="application/ld+json">
    {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "صلاتي - Salati",
    "description": "تطبيق لعرض مواقيت الصلاة الدقيقة",
    "applicationCategory": "LifestyleApplication",
    "operatingSystem": "All"
    }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6750a4">
    
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="apple-touch-icon" type="image/png" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <title>صلاتي - مواقيت الصلاة</title>

    <style>
        :root {
            --primary: #6750a4;
            --secondary: #eaddff;
            --bg: #fef7ff;
            --text: #1c1b1f;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .app-container { background-color: var(--bg); width: 100%; max-width: 400px; min-height: 85vh; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        header { background-color: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 24px 24px; }
        .date-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.15); border-radius: 12px; margin-bottom: 10px; padding: 5px; }
        .nav-btn { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; padding: 5px 15px; }
        .search-container { padding: 15px 20px; display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--secondary); outline: none; font-size: 1rem; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .prayer-list { flex: 1; padding: 0 20px 20px; }
        .prayer-card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .p-name { color: var(--primary); font-weight: 600; font-size: 1.1rem; }
        .p-time { color: var(--text); font-weight: bold; font-size: 1.2rem; }
        #method-display { font-size: 0.75rem; opacity: 0.85; margin-top: 8px; padding: 2px 10px; background: rgba(0,0,0,0.1); border-radius: 6px; display: inline-block; }
        .version-tag { text-align: center; font-size: 0.7rem; opacity: 0.4; padding: 10px; }
        #loader { display: none; color: white; font-size: 0.8rem; margin-top: 5px; }
        .error-msg { text-align: center; color: #ba1a1a; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="date-nav">
                <button class="nav-btn" onclick="changeDate(-1)">❮</button>
                <div id="display-date" style="font-weight: bold;">اليوم</div>
                <button class="nav-btn" onclick="changeDate(1)">❯</button>
            </div>
            <div id="hijri-date" style="font-size: 0.9rem; opacity: 0.9;">...</div>
            <h2 id="city-display" style="margin: 5px 0; font-size: 1.4rem;">...</h2>
            <div id="method-display">تحديد الطريقة...</div>
            <div id="loader">جاري التحديث...</div>
        </header>

        <div class="search-container">
            <input type="text" id="city-input" placeholder="اسم المدينة (مثلاً: Aleppo)" onkeypress="if(event.key === 'Enter') searchCity()">
            <button class="search-btn" onclick="searchCity()">🔍</button>
        </div>

        <div class="prayer-list" id="list"></div>
        <div class="version-tag">إصدار 1.8.7 - salati</div>
    </div>

    <script>
        let currentOffset = 0;
        let currentCity = "Aleppo";
        let currentCountry = "Syria";

        const translations = {
            "Umm Al-Qura University, Makkah": "جامعة أم القرى (مكة)",
            "Egyptian General Authority of Survey": "الهيئة المصرية العامة للمساحة",
            "Muslim World League": "رابطة العالم الإسلامي",
            "University of Islamic Sciences, Karachi": "جامعة العلوم الإسلامية بكراتشي",
            "Institute of Geophysics, University of Tehran": "معهد الجيوفيزياء بتهران"
        };

        function getFormattedDate(offset) {
            let d = new Date();
            d.setDate(d.getDate() + offset);
            return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
        }

        function to12H(time) {
            if(!time) return "--:--";
            let [h, m] = time.split(':').map(Number);
            let mod = h >= 12 ? 'م' : 'ص';
            h = h % 12 || 12;
            return `${h}:${String(m).padStart(2, '0')} ${mod}`;
        }

        async function loadPrayers() {
            const loader = document.getElementById('loader');
            const listContainer = document.getElementById('list');
            const dateStr = getFormattedDate(currentOffset);
            
            document.getElementById('display-date').innerText = currentOffset === 0 ? "اليوم" : dateStr;
            loader.style.display = 'block';

            // تحديد طريقة الحساب
            let methodId = 3; 
            const check = (currentCity + " " + currentCountry).toLowerCase();
            if (check.includes("egypt") || check.includes("مصر") || check.includes("cairo")) methodId = 5;
            else if (check.includes("saudi") || check.includes("syria") || check.includes("سوريا") || check.includes("makkah")) methodId = 4;

            try {
                // محاولة جلب البيانات
                const url = `https://api.aladhan.com/v1/timingsByCity/${dateStr}?city=${encodeURIComponent(currentCity)}&country=${encodeURIComponent(currentCountry)}&method=${methodId}`;
                const res = await fetch(url);
                const json = await res.json();
                
                if (json.code !== 200) throw new Error("API Error");

                const d = json.data;
                const t = d.timings;

                // تعديل وقت العشاء لتقويم أم القرى (ساعة ونصف بعد المغرب)
                if (methodId === 4) {
                    let [h, m] = t.Maghrib.split(':').map(Number);
                    let maghribDate = new Date();
                    maghribDate.setHours(h, m + 90);
                    t.Isha = `${String(maghribDate.getHours()).padStart(2, '0')}:${String(maghribDate.getMinutes()).padStart(2, '0')}`;
                }

                document.getElementById('hijri-date').innerText = `${d.date.hijri.day} ${d.date.hijri.month.ar} ${d.date.hijri.year} هـ`;
                document.getElementById('city-display').innerText = currentCity;
                document.getElementById('method-display').innerText = `طريقة الحساب: ${translations[d.meta.method.name] || d.meta.method.name}`;

                const names = {Fajr:'الفجر', Sunrise:'الشروق', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};
                listContainer.innerHTML = Object.keys(names).map(k => `
                    <div class="prayer-card">
                        <span class="p-name">${names[k]}</span>
                        <span class="p-time">${to12H(t[k])}</span>
                    </div>
                `).join('');

            } catch(e) {
                console.error("Fetch failed:", e);
                listContainer.innerHTML = `
                    <div class="error-msg">
                        <p>عذراً، فشل تحميل المواقيت.</p>
                        <button onclick="loadPrayers()" style="padding:8px 15px; border-radius:8px; border:none; background:var(--primary); color:white; cursor:pointer;">إعادة المحاولة</button>
                    </div>`;
            } finally { 
                loader.style.display = 'none'; 
            }
        }

        function searchCity() {
            let val = document.getElementById('city-input').value.trim();
            if(val) {
                currentCity = val;
                currentCountry = ""; // تركها فارغة للـ API للبحث الأشمل
                currentOffset = 0;
                loadPrayers();
            }
        }

        function changeDate(n) { 
            currentOffset += n; 
            loadPrayers(); 
        }

        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&accept-language=en`);
                        const data = await res.json();
                        currentCity = data.address.city || data.address.town || data.address.state || "Aleppo";
                        currentCountry = data.address.country || "Syria";
                    } catch(e) {
                        console.log("Geo lookup failed, using defaults");
                    }
                    loadPrayers();
                }, () => loadPrayers());
            } else { 
                loadPrayers(); 
            }
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
